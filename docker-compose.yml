version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: notes-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: notesmanager

  backend:
    build: ./backend
    container_name: notes-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/notesmanager
      SERVER_PORT: 8080
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: notes-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodb_data: