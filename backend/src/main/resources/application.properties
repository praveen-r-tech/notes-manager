# ============================================================
# Server Configuration
# ============================================================
server.port=${SERVER_PORT:8080}

# ============================================================
# MongoDB Configuration
# ============================================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/notesmanager}

# ============================================================
# File Upload Configuration
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ============================================================
# CORS Configuration
# ============================================================
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:3001}

# ============================================================
# Logging Configuration
# ============================================================
logging.level.com.notesmanager=DEBUG
logging.level.org.springframework.data.mongodb=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Swagger Configuration
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=${JWT_SECRET:notesManagerSecretKey123456789012345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}
